  card: { background:'#fff', border:'1px solid #e8e6e0', borderRadius:8, padding:'16px 0', marginBottom:24 },

  th: { padding:'8px 12px', textAlign:'left', fontWeight:500, fontSize:11, color:'#888', whiteSpace:'nowrap', textTransform:'uppercase', letterSpacing:'0.4px', borderBottom:'1px solid #e8e6e0' },
  td: { padding:'9px 12px', whiteSpace:'nowrap', fontSize:13, borderBottom:'1px solid #f0ede8' },
};

function Badge({ value, type }) {
  const bg = { good:'#eaf3de', warn:'#faeeda', bad:'#fcebeb', info:'#e6f1fb', neutral:'#f1efe8' };
  const fg = { good:'#3b6d11', warn:'#854f0b', bad:'#a32d2d', info:'#185fa5', neutral:'#5f5e5a' };
  return <span style={{ fontSize:11, fontWeight:500, padding:'2px 8px', borderRadius:4, background:bg[type]||bg.neutral, color:fg[type]||fg.neutral, display:'inline-block' }}>{value}</span>;
}

function Delta({ v }) {
  if (v == null) return <span style={{color:'#ccc'}}>–</span>;
  const color = v > 0.5 ? '#a32d2d' : v < -0.5 ? '#3b6d11' : '#888';
  return <span style={{ color, fontSize:12 }}>{v > 0 ? '+' : ''}{v.toFixed(1)}pp {v > 0.5 ? '↑' : v < -0.5 ? '↓' : '→'}</span>;
}

function TH({ children }) { return <th style={S.th}>{children}</th>; }
function TD({ children, style }) { return <td style={{ ...S.td, ...style }}>{children}</td>; }

function Section({ title, source }) {
  return (
    <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', marginBottom:12 }}>
      <h2 style={{ fontSize:14, fontWeight:600 }}>{title}</h2>
      {source && <span style={{ fontSize:11, color:'#aaa' }}>Kilde: {source}</span>}
    </div>
  );
}

                <TD style={{fontWeight:600}}>{r.indeks.toFixed(1)}</TD>
                <TD style={{fontWeight:500, color:vcolor}}>{r.vekst != null ? `+${r.vekst.toFixed(1)} %` : '–'}</TD>
                <TD style={{fontSize:12, color:'#888'}}>{r.merknad}</TD>
              </tr>;
            })}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function TabBors() {
  const segColor = { 'Kontor':'info', 'Handel':'warn', 'Bygg/Anlegg':'neutral', 'Bolig':'good' };
  return (
    <div>
      <div style={S.card}>
        <div style={S.cardPad}>
          <Section title="Børsnoterte selskaper — CRE-indikatorer" source="Oslo Børs, april 2026 (indikative tall)" />
          <p style={{ fontSize:12, color:'#888', marginBottom:8 }}>NAV-rabatt reflekterer markedets syn på underliggende eiendomsverdi — leading indicator for PE-fond.</p>
        </div>
        <div style={{ overflowX:'auto' }}>
          <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
            <thead><tr><TH>Selskap</TH><TH>Ticker</TH><TH>Segment</TH><TH>Markedsverdi</TH><TH>Direkteavkastning</TH><TH>NAV-rabatt %</TH><TH>CRE-relevans</TH></tr></thead>
            <tbody>{BORS.map((r,i) => {
              const navColor = r.nav == null ? '#ccc' : r.nav < -15 ? '#a32d2d' : r.nav < -8 ? '#854f0b' : '#3b6d11';
              return <tr key={i} onMouseEnter={e=>e.currentTarget.style.background='#fafaf8'} onMouseLeave={e=>e.currentTarget.style.background=''}>
                <TD style={{fontWeight:500}}>{r.selskap}</TD>
                <TD><span style={{ fontFamily:'monospace', fontSize:12, color:'#185fa5', background:'#e6f1fb', padding:'1px 6px', borderRadius:3 }}>{r.ticker}</span></TD>
                <TD><Badge value={r.segment} type={segColor[r.segment]||'neutral'} /></TD>
                <TD>{r.mverdi}</TD>
                <TD style={{fontWeight:500, color:'#3b6d11'}}>{r.da.toFixed(1)} %</TD>
                <TD style={{fontWeight:500, color:navColor}}>{r.nav != null ? `${r.nav > 0 ? '+' : ''}${r.nav} %` : '–'}</TD>
                <TD style={{fontSize:11, color:'#888', fontStyle:'italic'}}>{r.relevans}</TD>
              </tr>;
            })}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function TabTrans() {
  const trendColor = { 'Sterk':'good', 'Stigende':'good', 'Bedring':'info', 'Stabil':'neutral', 'Svak':'warn' };
  return (
    <div>
      <div style={S.card}>
        <div style={S.cardPad}><Section title="Transaksjonsvolum Norge — historikk" source="Colliers / Newsec / DNB Næringsmegling" /></div>
        <div style={{ overflowX:'auto' }}>
          <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
            <thead><tr><TH>År</TH><TH>Volum (mrd NOK)</TH><TH>Dominerende segment</TH><TH>Kjøpertype</TH><TH>Merknad</TH></tr></thead>
            <tbody>{TRANS.map((r,i) => {
              const n = r.volum;
              const color = n >= 100 ? '#3b6d11' : n >= 80 ? '#185fa5' : n < 60 ? '#a32d2d' : '#854f0b';
              return <tr key={i} onMouseEnter={e=>e.currentTarget.style.background='#fafaf8'} onMouseLeave={e=>e.currentTarget.style.background=''}>
                <TD style={{fontWeight:600}}>{r.ar}</TD>
                <TD>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <div style={{ width:Math.round(n/1.5), height:8, background:color, borderRadius:2, minWidth:4 }}></div>
                    <span style={{ fontWeight:600, color }}>{n} mrd</span>
                  </div>
                </TD>
                <TD style={{fontSize:12}}>{r.segment}</TD>
                <TD style={{fontSize:12}}>{r.kjoper}</TD>
                <TD style={{fontSize:12, color:'#666', fontStyle:'italic'}}>{r.merknad}</TD>
              </tr>;
            })}</tbody>
          </table>
        </div>
      </div>
      <div style={{...S.card, padding:'16px 20px'}}>
        <div style={{fontSize:13, fontWeight:600, marginBottom:12}}>Markedskommentar — Colliers/DNB Næringsmegling 2026</div>
        {[
          { label:'Flight to quality', tekst:'Livsselskaper og pensjonskapital dominerer — kjøper kun beste objekt. 16% av totalvolum i 2025 er historisk rekord.' },
          { label:'Belånte ute', tekst:'Høy rente gjør det vanskelig for finansielt belånte investorer å finne lønnsomt regnestykke. Egenkapitalkjøpere favoriseres.' },
          { label:'Logistikk vinner', tekst:'Størst transaksjonskategori. Prime yield 5,50% vs finansieringsrente ~4% gir fortsatt positivt regnestykke.' },
        ].map((p,i) => (
          <div key={i} style={{ display:'flex', gap:10, marginBottom:8 }}>
            <span style={{ fontSize:12, fontWeight:600, color:'#185fa5', minWidth:150 }}>{p.label}</span>
            <span style={{ fontSize:12, color:'#444' }}>{p.tekst}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────
const TABS = [
  { id:'leie', label:'Markedsleie', comp: TabLeie },
  { id:'yield', label:'Yielder', comp: TabYield },
  { id:'rente', label:'Rente', comp: TabRente },
  { id:'bygg', label:'Byggekostnader', comp: TabBygg },
  { id:'bors', label:'Børs', comp: TabBors },
  { id:'trans', label:'Transaksjoner', comp: TabTrans },
];

function App() {
  const [tab, setTab] = useState('leie');
  const Active = TABS.find(t => t.id === tab).comp;
  return (
    <div style={{ minHeight:'100vh' }}>
      <div style={{ background:'#fff', borderBottom:'1px solid #e8e6e0', padding:'16px 32px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ display:'flex', alignItems:'baseline', gap:10 }}>
          <span style={{ fontSize:18, fontWeight:600, letterSpacing:'-0.3px' }}>CRE Intelligence</span>
          <span style={{ fontSize:13, color:'#888' }}>norsk næringseiendom</span>
        </div>
        <span style={{ fontSize:11, color:'#aaa' }}>Oppdatert apr 2026</span>
      </div>

      <div style={{ background:'#fff', borderBottom:'1px solid #e8e6e0', padding:'12px 32px', display:'flex', gap:0, overflowX:'auto' }}>
        {KPI.map((k,i) => (
          <div key={i} style={{ padding:'0 24px', borderRight: i < KPI.length-1 ? '1px solid #e8e6e0' : 'none', minWidth:130 }}>
            <div style={{ fontSize:11, color:'#888', marginBottom:2, whiteSpace:'nowrap' }}>{k.label}</div>
            <div style={{ fontSize:17, fontWeight:600 }}>{k.value}</div>
            <div style={{ fontSize:10, color:'#bbb', marginTop:1 }}>{k.sub}</div>
          </div>
        ))}
      </div>

      <div style={{ background:'#fff', borderBottom:'1px solid #e8e6e0', padding:'0 32px', display:'flex' }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ padding:'12px 16px', fontSize:13, fontWeight: tab===t.id ? 600 : 400, color: tab===t.id ? '#1a1a1a' : '#666', borderBottom: tab===t.id ? '2px solid #1a1a1a' : '2px solid transparent' }}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{ padding:'24px 32px', maxWidth:1300 }}>
        <Active />
      </div>

      <div style={{ padding:'16px 32px', borderTop:'1px solid #e8e6e0', fontSize:11, color:'#bbb', display:'flex', justifyContent:'space-between', flexWrap:'wrap', gap:4 }}>
        <span>Kilder: UNION M2 · Entra Konsensusrapport · DNB Næringsmegling · Malling & Co · Realnor · SSB · Norges Bank · Oslo Børs · Colliers · Newsec</span>
        <span>Greencap AS — intern analyse</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
